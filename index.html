<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScoreAU — Live Sports Scores</title>
  <style>
    :root { --bg: #0d0d0d; --text: #f0f0f0; --mute: #888; --accent: #4f8ef7; --border: rgba(255,255,255,0.08); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    .sub { color: var(--mute); font-size: 1.1rem; margin-bottom: 2.5rem; }
    nav { display: flex; gap: 1.5rem; }
    a { color: var(--accent); text-decoration: none; font-size: 0.95rem; }
    a:hover { text-decoration: underline; }
    footer { position: fixed; bottom: 1.5rem; color: var(--mute); font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>ScoreAU</h1>
  <p class="sub">Every game. One app.</p>
  <nav>
    <a href="/scoreapp-site/privacy">Privacy Policy</a>
    <a href="/scoreapp-site/terms">Terms of Service</a>
    <a href="/scoreapp-site/support">Support</a>
  </nav>
  <footer>© 2026 ScoreAU</footer>
</body>
</html>
