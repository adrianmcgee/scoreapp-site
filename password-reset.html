<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - ScoreAU</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      padding: 40px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      transition: border-color 0.3s;
    }

    input[type="password"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .password-hint {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }

    .password-strength {
      font-size: 12px;
      margin-top: 6px;
      padding: 6px;
      border-radius: 4px;
      display: none;
    }

    .password-strength.weak {
      display: block;
      background-color: #ffebee;
      color: #c62828;
    }

    .password-strength.ok {
      display: block;
      background-color: #fff3e0;
      color: #e65100;
    }

    .password-strength.good {
      display: block;
      background-color: #e8f5e9;
      color: #2e7d32;
    }

    .button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.3s;
      margin-top: 20px;
    }

    .button:hover:not(:disabled) {
      opacity: 0.9;
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      display: block;
      background-color: #e8f5e9;
      color: #1b5e20;
      border: 1px solid #81c784;
    }

    .message.error {
      display: block;
      background-color: #ffebee;
      color: #b71c1c;
      border: 1px solid #ef5350;
    }

    .message.info {
      display: block;
      background-color: #e3f2fd;
      color: #0d47a1;
      border: 1px solid #64b5f6;
    }

    .link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .link a:hover {
      text-decoration: underline;
    }

    .loader {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .form-container {
      display: none;
    }

    .form-container.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your new password below</p>

    <div id="message"></div>

    <div class="form-container active" id="formContainer">
      <form id="resetForm">
        <div class="form-group">
          <label for="password">New Password</label>
          <input
            type="password"
            id="password"
            placeholder="At least 8 characters"
            required
          />
          <p class="password-hint">Must be at least 8 characters</p>
          <div class="password-strength" id="strengthIndicator"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Re-enter your password"
            required
          />
        </div>

        <button type="submit" class="button" id="submitBtn">
          Reset Password
        </button>
      </form>

      <div class="link">
        <p>Remember your password? <a href="http://localhost:5173">Sign in</a></p>
      </div>
    </div>

    <div class="form-container" id="successContainer">
      <div class="message success">
        <strong>✓ Password reset successful!</strong>
        <p style="margin-top: 8px;">You can now sign in with your new password.</p>
      </div>
      <a href="http://localhost:5173" class="button" style="display: block; text-align: center; text-decoration: none; color: white;">
        Go to ScoreAU
      </a>
    </div>
  </div>

  <script>
    // API endpoint for password reset
    const API_BASE_URL = 'https://scoreapp-server-production.up.railway.app';
    
    const form = document.getElementById('resetForm');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');
    const formContainer = document.getElementById('formContainer');
    const successContainer = document.getElementById('successContainer');
    const strengthIndicator = document.getElementById('strengthIndicator');

    // Get token from URL query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    function showMessage(text, type = 'info') {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
    }

    function hideMessage() {
      messageDiv.className = 'message';
    }

    function updatePasswordStrength() {
      const password = passwordInput.value;
      let strength = 'weak';
      let text = '⚠ Weak';

      if (password.length >= 8 && password.length < 12) {
        strength = password.match(/[A-Z]/) && password.match(/[0-9]/) ? 'ok' : 'weak';
        text = password.match(/[A-Z]/) && password.match(/[0-9]/) ? '≈ Fair' : '⚠ Weak';
      } else if (password.length >= 12) {
        strength = password.match(/[A-Z]/) && password.match(/[0-9]/) && password.match(/[^a-zA-Z0-9]/) ? 'good' : 'ok';
        text = password.match(/[A-Z]/) && password.match(/[0-9]/) && password.match(/[^a-zA-Z0-9]/) ? '✓ Strong' : '≈ Fair';
      }

      strengthIndicator.textContent = text;
      strengthIndicator.className = `password-strength ${strength}`;
    }

    function validateForm() {
      if (!token) {
        showMessage('Invalid or missing password reset link. Please request a new one.', 'error');
        formContainer.classList.remove('active');
        return false;
      }

      if (passwordInput.value.length < 8) {
        showMessage('Password must be at least 8 characters', 'error');
        return false;
      }

      if (passwordInput.value !== confirmInput.value) {
        showMessage('Passwords do not match', 'error');
        return false;
      }

      return true;
    }

    async function handleSubmit(e) {
      e.preventDefault();

      if (!validateForm()) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loader"></span> Resetting...';
      hideMessage();

      try {
        const response = await fetch(`${API_BASE_URL}/auth/password-reset`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            token,
            newPassword: passwordInput.value,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          let errorMsg = data.error || 'Failed to reset password';
          if (response.status === 410) {
            errorMsg = 'This password reset link has expired. Please request a new one.';
          } else if (response.status === 400 && errorMsg.includes('already been used')) {
            errorMsg = 'This password reset link has already been used. Please request a new one.';
          }
          showMessage(errorMsg, 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
          return;
        }

        // Show success state
        formContainer.classList.remove('active');
        successContainer.classList.add('active');
      } catch (error) {
        console.error('Error:', error);
        showMessage('An error occurred. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    }

    // Validate token presence on load
    if (!token) {
      showMessage('No password reset link provided. Please check your email or request a new reset link.', 'error');
      formContainer.classList.remove('active');
    }

    // Event listeners
    passwordInput.addEventListener('input', updatePasswordStrength);
    form.addEventListener('submit', handleSubmit);

    // Initial state
    if (!token) {
      submitBtn.disabled = true;
    }
  </script>
</body>
</html>
